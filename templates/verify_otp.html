{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper"
    style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="card auth-card"
        style="max-width: 450px; width: 100%; padding: 3rem; border-radius: 20px; background: var(--glass-bg); backdrop-filter: blur(10px); border: var(--glass-border); box-shadow: var(--shadow-premium);">
        <div class="auth-header" style="text-align: center; margin-bottom: 2.5rem;">
            <div class="icon-circle"
                style="width: 80px; height: 80px; background: rgba(201, 168, 76, 0.1); border: 1px solid rgba(201, 168, 76, 0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i class="fas fa-shield-alt" style="font-size: 2.5rem; color: var(--accent-gold);"></i>
            </div>
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--text-primary);">Verify Your Email</h1>
            <p style="color: var(--text-secondary); font-size: 0.95rem;">We've sent a 6-digit verification code to
                <br><strong style="color: var(--accent-gold);">{{ email }}</strong></p>
        </div>

        {% if error %}
        <div class="alert alert-danger"
            style="background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3); color: #ff4d4d; padding: 1rem; border-radius: 10px; margin-bottom: 2rem; text-align: center;">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success"
            style="background: rgba(0, 255, 127, 0.1); border: 1px solid rgba(0, 255, 127, 0.3); color: #00ff7f; padding: 1rem; border-radius: 10px; margin-bottom: 2rem; text-align: center;">
            <i class="fas fa-check-circle"></i> {{ success }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.verify_otp', email=email) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

            <div class="form-group" style="margin-bottom: 2rem;">
                <label
                    style="display: block; margin-bottom: 1rem; color: var(--text-secondary); text-align: center; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em;">Enter
                    6-Digit Code</label>
                <input type="text" name="otp" id="otp-input" maxlength="6" required placeholder="000000"
                    style="width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 1.2rem; color: white; text-align: center; font-size: 2rem; letter-spacing: 1rem; font-family: monospace; outline: none; transition: border-color 0.3s;">
            </div>

            <button type="submit" class="btn-primary w-100"
                style="padding: 1.2rem; font-size: 1.1rem; font-weight: 700; border-radius: 12px; background: var(--gold-gradient); border: none; color: black; cursor: pointer; transition: transform 0.2s;">
                Verify & Activate
            </button>
        </form>

        <div class="auth-footer"
            style="margin-top: 2.5rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
            Didn't receive the code?
            <a href="{{ url_for('auth.resend_otp', email=email) }}"
                style="color: var(--accent-gold); text-decoration: none; font-weight: 600; margin-left: 5px;">Resend
                Code</a>
        </div>
    </div>
</div>

<script>
    const otpInput = document.getElementById('otp-input');
    otpInput.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });

    // Auto-focus input
    window.onload = () => otpInput.focus();
</script>
{% endblock %}
