{% extends "base.html" %}

{% block content %}
<div class="profile-page-wrapper animate-up">
    <div class="profile-container">
        <div class="profile-header">
            <div class="avatar-large">
                <i class="fas fa-user-circle"></i>
            </div>
            <h1>{{ _t('your_legal_account') }}</h1>
            <p>{{ _t('manage_identity') }}</p>
        </div>

        <div class="glass-card profile-card">
            <form action="{{ url_for('dashboard.profile_update') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                <div class="form-grid">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> {{ _t('full_name') }}</label>
                        <input type="text" name="name" value="{{ user.name_encrypted | decrypt_name }}" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> {{ _t('email_address') }}</label>
                        <input type="email" value="{{ user.email_encrypted | decrypt_name }}" disabled
                            title="Email cannot be changed">
                        <small class="form-hint">{{ _t('email_change_hint') }}</small>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> {{ _t('phone_number') }}</label>
                        <input type="tel" name="phone" value="{{ user.phone_encrypted | decrypt_name }}" required>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> {{ _t('your_location') }}</label>
                        <input type="text" name="location"
                            value="{{ user.location_encrypted | decrypt_name if user.location_encrypted else '' }}"
                            placeholder="{{ _t('location_placeholder') }}">
                        <small class="form-hint">{{ _t('location_hint') }}</small>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-language"></i> {{ _t('preferred_language_label') }}</label>
                        <select name="preferred_language">
                            <option value="English" {% if user.preferred_language=='English' %}selected{% endif %}>
                                English</option>
                            <option value="Hindi" {% if user.preferred_language=='Hindi' %}selected{% endif %}>Hindi
                                (हिन्दी)</option>
                            <option value="Telugu" {% if user.preferred_language=='Telugu' %}selected{% endif %}>Telugu
                                (తెలుగు)</option>
                            <option value="Tamil" {% if user.preferred_language=='Tamil' %}selected{% endif %}>Tamil
                                (தமிழ்)</option>
                            <option value="Kannada" {% if user.preferred_language=='Kannada' %}selected{% endif %}>
                                Kannada (ಕನ್ನಡ)</option>
                            <option value="Marathi" {% if user.preferred_language=='Marathi' %}selected{% endif %}>
                                Marathi (मराठी)</option>
                            <option value="Bengali" {% if user.preferred_language=='Bengali' %}selected{% endif %}>
                                Bengali (বাংলা)</option>
                            <option value="Gujarati" {% if user.preferred_language=='Gujarati' %}selected{% endif %}>
                                Gujarati (ગુજરાતી)</option>
                        </select>
                        <small class="form-hint">{{ _t('language_hint') }}</small>
                    </div>
                </div>

                <div class="profile-actions">
                    <button type="submit" class="btn-primary">{{ _t('save_changes') }} <i
                            class="fas fa-check"></i></button>
                    <a href="{{ url_for('dashboard.member_home') }}" class="btn-primary-outline">{{ _t('cancel') }}</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .profile-page-wrapper {
        min-height: 80vh;
        padding: 4rem 2rem;
        display: flex;
        justify-content: center;
    }

    .profile-container {
        max-width: 800px;
        width: 100%;
    }

    .profile-header {
        text-align: center;
        margin-bottom: 3rem;
    }

    .avatar-large {
        font-size: 5rem;
        color: var(--accent-gold);
        margin-bottom: 1.5rem;
        filter: drop-shadow(0 0 15px rgba(201, 168, 76, 0.3));
    }

    .profile-header h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
    }

    .profile-header p {
        color: var(--text-secondary);
        font-size: 1.1rem;
    }

    .profile-card {
        padding: 3rem;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        margin-bottom: 3rem;
    }

    .form-hint {
        display: block;
        margin-top: 0.5rem;
        font-size: 0.75rem;
        color: var(--text-secondary);
        opacity: 0.8;
    }

    .profile-actions {
        display: flex;
        gap: 1.5rem;
        justify-content: flex-end;
        padding-top: 2rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
        }

        .profile-actions {
            flex-direction: column;
        }

        .profile-actions button,
        .profile-actions a {
            width: 100%;
        }
    }
</style>
{% endblock %}
