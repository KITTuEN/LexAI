{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus gold-icon large-icon"></i>
            <h1>Create Account</h1>
            <p>Join LexAI legal advisor</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.signup') }}">
            <div class="form-group">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" required placeholder="+91 98765-43210">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary w-100">Sign Up</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
    </div>
</div>

<style>
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }

    .auth-card {
        width: 100%;
        max-width: 500px;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .large-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
    }

    .w-100 {
        width: 100%;
    }

    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-secondary);
    }

    .auth-footer a {
        color: var(--accent-gold);
        text-decoration: none;
    }

    .alert-danger {
        background: rgba(255, 0, 0, 0.1);
        color: #ff4d4d;
        padding: 1rem;
        border-radius: 6px;
        margin-bottom: 1rem;
        border: 1px solid rgba(255, 0, 0, 0.2);
    }
</style>
{% endblock %}
