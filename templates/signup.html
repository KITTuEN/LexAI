{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus gold-icon large-icon"></i>
            <h1>{{ _t('create_account_title') }}</h1>
            <p>{{ _t('join_lexai_desc') }}</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.signup') }}" id="signupForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

            <div class="role-selector">
                <label class="role-option">
                    <input type="radio" name="role" value="user" checked>
                    <div class="role-card">
                        <i class="fas fa-user"></i>
                        <span>{{ _t('citizen_role') }}</span>
                    </div>
                </label>
                <label class="role-option">
                    <input type="radio" name="role" value="lawyer">
                    <div class="role-card">
                        <i class="fas fa-gavel"></i>
                        <span>{{ _t('legal_pro_role') }}</span>
                    </div>
                </label>
            </div>

            <div class="form-group">
                <label>{{ _t('full_name_label') }}</label>
                <input type="text" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>{{ _t('email_addr_label') }}</label>
                <input type="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>{{ _t('phone_num_label') }}</label>
                <input type="tel" name="phone" required placeholder="+91 98765-43210">
            </div>

            <!-- Lawyer Specific Fields -->
            <div id="lawyerFields" style="display: none;">
                <div class="form-group">
                    <label>Father's Name</label>
                    <input type="text" name="father_name" placeholder="Father's Full Name">
                </div>
                <div class="form-group">
                    <label>Mother's Name</label>
                    <input type="text" name="mother_name" placeholder="Mother's Full Name">
                </div>
                <div class="form-group">
                    <label>Aadhar Number</label>
                    <input type="text" name="aadhar" placeholder="12-digit Aadhar Number">
                </div>
                <div class="form-group">
                    <label>Lawyer ID Card / Bar Council Number</label>
                    <input type="text" name="lawyer_id" placeholder="e.g. BC/123/2024">
                </div>
                <div class="form-group">
                    <label>Cases Won & Professional Experience</label>
                    <textarea name="experience_summary" rows="4" style="width: 100%;"
                        placeholder="Describe your successful cases and years of practice..."></textarea>
                </div>
            </div>

            <div class="form-group">
                <label>{{ _t('password_label') }}</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>{{ _t('confirm_pass_label') }}</label>
                <input type="password" name="confirm_password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary w-100">{{ _t('create_acc_btn') }}</button>
        </form>

        <p class="auth-footer">{{ _t('already_acc') }} <a href="{{ url_for('auth.login') }}">{{ _t('login') }}</a></p>
    </div>
</div>

<script>
    document.querySelectorAll('input[name="role"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            const lawyerFields = document.getElementById('lawyerFields');
            const inputs = lawyerFields.querySelectorAll('input, textarea');
            if (e.target.value === 'lawyer') {
                lawyerFields.style.display = 'block';
                inputs.forEach(input => input.required = true);
            } else {
                lawyerFields.style.display = 'none';
                inputs.forEach(input => input.required = false);
            }
        });
    });
</script>
{% endblock %}
