{% extends "base.html" %}

{% block content %}
<div class="search-container">
    <div class="search-box card">
        <h1>{{ _t('search_ipc_bns') }}</h1>
        <p>{{ _t('search_hint') }}</p>
        <div class="search-input-wrapper">
            <input type="text" id="searchInput" placeholder="Search legal sections...">
            <button id="searchBtn" class="btn-primary">{{ _t('search') }}</button>
        </div>
    </div>

    <div id="searchLoading" class="loading-state" style="display: none;">
        <div class="spinner"></div>
        <p>{{ _t('search_loading') }}</p>
    </div>

    <div id="searchResult" class="search-result-area">
        <!-- Results will be injected here -->
    </div>
</div>

<style>
    .search-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 2rem;
    }

    .search-box {
        text-align: center;
        margin-bottom: 2rem;
    }

    .search-input-wrapper {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
    }

    .search-input-wrapper input {
        flex: 1;
        padding: 1rem;
        background: #1D263B;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: white;
        font-size: 1.1rem;
    }

    .loading-state {
        text-align: center;
        padding: 3rem;
    }

    .spinner {
        border: 4px solid rgba(201, 168, 76, 0.1);
        border-left: 4px solid var(--accent-gold);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem;
    }

    @keyframes spin {
        100% {
            transform: rotate(360deg);
        }
    }

    .result-card {
        animation: fadeIn 0.5s ease-out;
    }

    .result-header {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 1rem;
        margin-bottom: 1.5rem;
    }

    .gold-text {
        color: var(--accent-gold);
    }

    .badge-row {
        display: flex;
        gap: 1rem;
        margin: 1rem 0;
    }

    .badge {
        padding: 0.3rem 0.8rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
    }

    .badge.red {
        background: rgba(255, 0, 0, 0.1);
        color: #ff4d4d;
    }

    .badge.green {
        background: rgba(0, 255, 0, 0.1);
        color: #00ff00;
    }

    .badge.blue {
        background: rgba(0, 191, 255, 0.1);
        color: #00bfff;
    }

    .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
    }

    .info-section h4 {
        margin-bottom: 0.8rem;
        color: var(--accent-gold);
    }

    .landmark-cases {
        list-style: none;
    }

    .landmark-cases li {
        margin-bottom: 0.5rem;
        padding-left: 1.5rem;
        position: relative;
    }

    .landmark-cases li::before {
        content: "•";
        color: var(--accent-gold);
        position: absolute;
        left: 0;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('searchLoading');
        const resultArea = document.getElementById('searchResult');

        const performSearch = async () => {
            const query = searchInput.value.trim();
            if (!query) return;

            resultArea.innerHTML = '';
            loading.style.display = 'block';

            try {
                const response = await fetch('/search/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token() }}'
                    },
                    body: JSON.stringify({ query })
                });
                const data = await response.json();
                loading.style.display = 'none';
                renderResult(data);
            } catch (error) {
                console.error('Error:', error);
                loading.style.display = 'none';
            }
        };

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        const renderResult = (dataList) => {
            if (!Array.isArray(dataList)) {
                dataList = [dataList];
            }
            if (dataList.length === 0) {
                resultArea.innerHTML = '<p>No results found.</p>';
                return;
            }

            resultArea.innerHTML = dataList.map(data => `
            <div class="card result-card" style="margin-bottom: 2rem;">
                <div class="result-header">
                    <h2 class="gold-text">${data.section}</h2>
                    <h1>${data.title}</h1>
                    <p class="subtitle">${data.chapter}</p>
                </div>
                
                <div class="badge-row">
                    <span class="badge ${(data.bailable && data.bailable.toLowerCase().includes('yes')) || data.bailable === true ? 'green' : 'red'}">${(data.bailable && data.bailable.toLowerCase().includes('yes')) || data.bailable === true ? '{{ _t("bailable") }}' : '{{ _t("non_bailable") }}'}</span>
                    <span class="badge ${(data.cognizable && data.cognizable.toLowerCase().includes('yes')) || data.cognizable === true ? 'blue' : 'red'}">${(data.cognizable && data.cognizable.toLowerCase().includes('yes')) || data.cognizable === true ? '{{ _t("cognizable") }}' : '{{ _t("non_cognizable") }}'}</span>
                    <span class="badge blue">{{ _t("triable_by") }}: ${data.triable_by}</span>
                </div>

                <div class="info-section">
                    <h4>{{ _t('description') }}</h4>
                    <p>${data.description}</p>
                </div>

                <div class="result-grid" style="margin-top: 2rem;">
                    <div class="info-section">
                        <h4>{{ _t('punishment') }}</h4>
                        <p>${data.punishment}</p>
                    </div>
                    <div class="info-section">
                        <h4>{{ _t('key_ingredients') }}</h4>
                        <ul class="landmark-cases">
                            ${Array.isArray(data.key_ingredients) ? data.key_ingredients.map(i => `<li>${i}</li>`).join('') : `<li>${data.key_ingredients}</li>`}
                        </ul>
                    </div>
                </div>

                <div class="info-section" style="margin-top: 2rem;">
                    <h4>{{ _t('landmark_cases') }}</h4>
                    <ul class="landmark-cases">
                        ${Array.isArray(data.landmark_cases) ? data.landmark_cases.map(c => `<li>${c}</li>`).join('') : `<li>${data.landmark_cases}</li>`}
                    </ul>
                </div>
            </div>
            `).join('');
        };
    });
</script>
{% endblock %}
